<!DOCTYPE html>
<html>
<head>
    <title>HTML Layout Example</title>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>My Simple Website</h1>
        <p>Welcome to my webpage</p>
    </header>

    <!-- Main Content -->
    <main>

        <!-- Section 1 -->
        <section>
            <h2>About Us</h2>
            <p>We share useful information and tutorials.</p>
        </section>

        <!-- Section 2 with Article -->
        <section>
            <h2>Latest Articles</h2>

            <article>
                <h3>What is HTML?</h3>
                <p>HTML is a markup language used to create webpages.</p>
            </article>

            <article>
                <h3>What is CSS?</h3>
                <p>CSS is used to style and design webpages.</p>
            </article>

        </section>

    </main>

    <!-- Footer Section -->
    <footer>
        <p>© 2025 My Simple Website</p>
    </footer>

</body>
</html>
